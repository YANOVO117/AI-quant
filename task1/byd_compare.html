    <div class="change ${aChg >= 0 ? 'up' : 'down'}">区间涨跌 ${aChg >= 0 ? '+' : ''}${aChg}%</div>
  </div>
  <div class="card card-hk">
    <div class="label">港股 01211.HK 最新价 HK$</div>
    <div class="value">${hkPrice.toFixed(2)}</div>
    <div class="change ${hkChg >= 0 ? 'up' : 'down'}">区间涨跌 ${hkChg >= 0 ? '+' : ''}${hkChg}%</div>
  </div>
  <div class="card card-compare">
    <div class="label">AH比价 (A/HK$/0.92)</div>
    <div class="value">${ahRatio}</div>
    <div class="change" style="color:var(--text-secondary);">>1 A股溢价 &nbsp;|&nbsp; <1 港股溢价</div>
  </div>
  <div class="card card-compare">
    <div class="label">A股日均成交额</div>
    <div class="value">${(A_DATA.reduce((s,r)=>s+r[6],0)/A_DATA.length/1e8).toFixed(2)}亿</div>
    <div class="change" style="color:var(--text-secondary);">港股 ${(HK_DATA.reduce((s,r)=>s+r[6],0)/HK_DATA.length/1e8).toFixed(2)}亿 HKD</div>
  </div>
  <div class="card card-a">
    <div class="label">A股 区间最高 / 最低</div>
    <div class="value">${Math.max(...A_DATA.map(r=>r[3])).toFixed(2)} / ${Math.min(...A_DATA.map(r=>r[4])).toFixed(2)}</div>
  </div>
  <div class="card card-hk">
    <div class="label">港股 区间最高 / 最低</div>
    <div class="value">${Math.max(...HK_DATA.map(r=>r[3])).toFixed(2)} / ${Math.min(...HK_DATA.map(r=>r[4])).toFixed(2)}</div>
  </div>
`;
document.getElementById('stats-cards').innerHTML = cardsHtml;

// ===== Tab Switching =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  setTimeout(() => {
    [chartKlineA, chartKlineHk, chartNormalized, chartAhRatio, chartVolume].forEach(c => c && c.resize());
  }, 100);
}

// ===== Helper: format kline data =====
function toOhlc(data) {
  return data.map(r => [r[0], r[1], r[2], r[3], r[4]]);
}

// ===== Chart: A-Share Kline =====
const chartKlineA = echarts.init(document.getElementById('chart-kline-a'));
chartKlineA.setOption({
  tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
  grid: { left: '12%', right: '5%', top: 8, bottom: 30 },
  xAxis: { type: 'category', data: A_DATA.map(r=>r[0]), axisLabel: { formatter: v => v.slice(5) } },
  yAxis: { scale: true, axisLabel: { formatter: v => '¥'+v } },
  dataZoom: [{ type: 'inside' }, { type: 'slider', bottom: 0 }],
  series: [{
    type: 'candlestick',
    data: toOhlc(A_DATA),
    itemStyle: { color: '#e74c3c', color0: '#27ae60', borderColor: '#e74c3c', borderColor0: '#27ae60' }
  }]
});

// ===== Chart: HK Kline =====
const chartKlineHk = echarts.init(document.getElementById('chart-kline-hk'));
chartKlineHk.setOption({
  tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
  grid: { left: '12%', right: '5%', top: 8, bottom: 30 },
  xAxis: { type: 'category', data: HK_DATA.map(r=>r[0]), axisLabel: { formatter: v => v.slice(5) } },
  yAxis: { scale: true, axisLabel: { formatter: v => 'HK$'+v } },
  dataZoom: [{ type: 'inside' }, { type: 'slider', bottom: 0 }],
  series: [{
    type: 'candlestick',
    data: toOhlc(HK_DATA),
    itemStyle: { color: '#e74c3c', color0: '#27ae60', borderColor: '#e74c3c', borderColor0: '#27ae60' }
  }]
});

// ===== Chart: Normalized Price =====
const chartNormalized = echarts.init(document.getElementById('chart-normalized'));

// Use common dates, rebase to 100
const normDates = [...commonDates].reverse();
const aNormData = normDates.map((d, i) => {
  const row = aMap.get(d);
  return [(row[2] / aMap.get(normDates[0])[2] * 100).toFixed(2)];
});
const hkNormData = normDates.map((d, i) => {
  const row = hkMap.get(d);
  return [(row[2] / hkMap.get(normDates[0])[2] * 100).toFixed(2)];
});

chartNormalized.setOption({
  tooltip: { trigger: 'axis' },
  legend: { data: ['A股 002594', '港股 01211'], top: 0 },
  grid: { left: '8%', right: '5%', top: 36, bottom: 30 },
  xAxis: { type: 'category', data: normDates, axisLabel: { formatter: v => v.slice(5) } },
  yAxis: { type: 'value', name: '基准=100', axisLabel: { formatter: v => v.toFixed(0) } },
  dataZoom: [{ type: 'inside' }, { type: 'slider', bottom: 0 }],
  series: [
    { name: 'A股 002594', type: 'line', data: aNormData, lineStyle: { width: 2, color: '#e74c3c' }, itemStyle: { color: '#e74c3c' }, symbol: 'none', smooth: true },
    { name: '港股 01211', type: 'line', data: hkNormData, lineStyle: { width: 2, color: '#3498db' }, itemStyle: { color: '#3498db' }, symbol: 'none', smooth: true }
  ]
});

// ===== Chart: AH Ratio =====
const chartAhRatio = echarts.init(document.getElementById('chart-ahratio'));

// AH ratio on common dates with 0.92 exchange rate
const ahData = normDates.map(d => {
  const a = aMap.get(d), hk = hkMap.get(d);
  return [(a[2] / (hk[2] * 0.92)).toFixed(4)];
});

chartAhRatio.setOption({
  tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>AH比价: ${p[0].value}` },
  grid: { left: '10%', right: '5%', top: 8, bottom: 30 },
  xAxis: { type: 'category', data: normDates, axisLabel: { formatter: v => v.slice(5) } },
  yAxis: { type: 'value', name: 'AH比价', scale: true },
  dataZoom: [{ type: 'inside' }, { type: 'slider', bottom: 0 }],
  series: [{
    type: 'line', data: ahData,
    lineStyle: { width: 2, color: '#e67e22' },
    itemStyle: { color: '#e67e22' },
    symbol: 'none',
    smooth: true,
    markLine: {
      silent: true,
      lineStyle: { type: 'dashed', color: '#bdc3c7' },
      data: [{ yAxis: 1, label: { formatter: '平价线=1' } }],
      symbol: 'none'
    },
    areaStyle: {
      color: new echarts.graphic.LinearGradient(0,0,0,1,[
        {offset: 0, color: 'rgba(230,126,34,0.25)'},
        {offset: 1, color: 'rgba(230,126,34,0.02)'}
      ])
    }
  }]
});

// ===== Chart: Volume Comparison =====
const chartVolume = echarts.init(document.getElementById('chart-volume'));

chartVolume.setOption({
  tooltip: { trigger: 'axis' },
  legend: { data: ['A股成交量(手)', '港股成交量(股)'], top: 0 },
  grid: { left: '10%', right: '5%', top: 36, bottom: 30 },
  xAxis: { type: 'category', data: normDates, axisLabel: { formatter: v => v.slice(5) } },
  yAxis: [
    { type: 'value', name: 'A股 成交量(手)', axisLabel: { formatter: v => (v/10000).toFixed(0)+'万' } },
    { type: 'value', name: '港股 成交量(股)', axisLabel: { formatter: v => (v/1e6).toFixed(0)+'M' } }
  ],
  dataZoom: [{ type: 'inside' }, { type: 'slider', bottom: 0 }],
  series: [
    {
      name: 'A股成交量(手)', type: 'bar',
      data: normDates.map(d => aMap.get(d)[5]),
      yAxisIndex: 0,
      itemStyle: {
        color: params => {
          const d = aMap.get(normDates[params.dataIndex]);
          return d[2] >= d[1] ? 'rgba(231,76,60,0.6)' : 'rgba(39,174,96,0.6)';
        }
      }
    },
    {
      name: '港股成交量(股)', type: 'bar',
      data: normDates.map(d => hkMap.get(d)[5]),
      yAxisIndex: 1,
      itemStyle: {
        color: params => {
          const d = hkMap.get(normDates[params.dataIndex]);
          return d[2] >= d[1] ? 'rgba(52,152,219,0.5)' : 'rgba(39,174,96,0.4)';
        }
      }
    }
  ]
});

// Resize on window change
window.addEventListener('resize', () => {
  [chartKlineA, chartKlineHk, chartNormalized, chartAhRatio, chartVolume].forEach(c => c.resize());
});
</script>
</body>
</html>
