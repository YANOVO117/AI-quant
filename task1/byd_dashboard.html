.card-hk { border-left: 3px solid var(--blue); }

function calcMA(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { result.push('-'); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i - j][2];
    result.push((sum / period).toFixed(2));
  }
  return result;
}
